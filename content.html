<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Daily Class Content</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f0f0f, #1b1b1b);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
    }

    .editor-container {
      max-width: 1000px;
      margin: 0 auto;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 25px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.35);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #66d9d0;
      font-size: 2rem;
    }

    .info {
      text-align: center;
      color: #d6d6d6;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #e8e8e8;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.04);
      color: #fff;
      outline: none;
      font-size: 1rem;
      transition: 0.3s ease;
    }

    input:focus, textarea:focus {
      border-color: #66d9d0;
      box-shadow: 0 0 0 3px rgba(102, 217, 208, 0.12);
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 25px;
    }

    button, .go-btn {
      border: none;
      padding: 14px 22px;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: bold;
      text-decoration: none;
      transition: 0.3s ease;
    }

    .save-btn {
      background: #66d9d0;
      color: #111;
    }

    .save-btn:hover {
      background: #7ef7ed;
      transform: translateY(-2px);
    }

    .reset-btn {
      background: #2b2b2b;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .reset-btn:hover {
      background: #3a3a3a;
    }

    .go-btn {
      background: #ffffff;
      color: #111;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .go-btn:hover {
      background: #f0f0f0;
      transform: translateY(-2px);
    }

    .preview-box {
      margin-top: 25px;
      background: rgba(255,255,255,0.02);
      border-radius: 18px;
      padding: 18px;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .preview-box h3 {
      margin-bottom: 12px;
      color: #66d9d0;
    }

    .preview-box img {
      width: 100%;
      max-height: 350px;
      object-fit: cover;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      display: none;
    }

    .message {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 12px;
      display: none;
      font-weight: 600;
    }

    .success {
      background: rgba(102, 217, 208, 0.12);
      border: 1px solid rgba(102, 217, 208, 0.3);
      color: #7ef7ed;
    }

    @media (max-width: 768px) {
      .editor-container {
        padding: 18px;
      }

      h1 {
        font-size: 1.6rem;
      }

      button, .go-btn {
        width: 100%;
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <div class="editor-container">
    <h1>Edit Daily Class Content</h1>
    <p class="info">
      Update today's class topic here. Click <strong>Save Content</strong> and it will automatically appear in <strong>index.html</strong>.
    </p>

    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" placeholder="Enter class topic title" />
    </div>

    <div class="form-group">
      <label for="subtitle">Subtitle / Introduction</label>
      <textarea id="subtitle" placeholder="Enter short introduction"></textarea>
    </div>

    <div class="form-group">
      <label for="point1">Point 1</label>
      <textarea id="point1" placeholder="Enter point 1"></textarea>
    </div>

    <div class="form-group">
      <label for="point2">Point 2</label>
      <textarea id="point2" placeholder="Enter point 2"></textarea>
    </div>

    <div class="form-group">
      <label for="point3">Point 3</label>
      <textarea id="point3" placeholder="Enter point 3"></textarea>
    </div>

    <div class="form-group">
      <label for="stat1">Highlight / Key Stat 1</label>
      <textarea id="stat1" placeholder="Enter highlight 1"></textarea>
    </div>

    <div class="form-group">
      <label for="stat2">Highlight / Key Stat 2</label>
      <textarea id="stat2" placeholder="Enter highlight 2"></textarea>
    </div>

    <div class="form-group">
      <label for="stat3">Highlight / Key Stat 3</label>
      <textarea id="stat3" placeholder="Enter highlight 3"></textarea>
    </div>

    <div class="form-group">
      <label for="footerNote">Footer Note</label>
      <input type="text" id="footerNote" placeholder="Enter footer note" />
    </div>

    <div class="form-group">
      <label for="imageUrl">Image URL</label>
      <input type="text" id="imageUrl" placeholder="Paste image URL here" oninput="previewImage()" />
    </div>

    <div class="preview-box">
      <h3>Image Preview</h3>
      <img id="imagePreview" alt="Image Preview">
    </div>

    <div class="btn-row">
      <button class="save-btn" onclick="saveContent()">Save Content</button>
      <button class="reset-btn" onclick="resetContent()">Reset Content</button>
      <a class="go-btn" href="index.html">Go to Main Page</a>
    </div>

    <div class="message success" id="successMsg">Content saved successfully! Open index.html to view changes.</div>
  </div>

  <script>
    function loadExistingContent() {
      const savedData = JSON.parse(localStorage.getItem("dailyClassContent"));

      if (savedData) {
        document.getElementById("title").value = savedData.title || "";
        document.getElementById("subtitle").value = savedData.subtitle || "";
        document.getElementById("point1").value = savedData.point1 || "";
        document.getElementById("point2").value = savedData.point2 || "";
        document.getElementById("point3").value = savedData.point3 || "";
        document.getElementById("stat1").value = savedData.stat1 || "";
        document.getElementById("stat2").value = savedData.stat2 || "";
        document.getElementById("stat3").value = savedData.stat3 || "";
        document.getElementById("footerNote").value = savedData.footerNote || "";
        document.getElementById("imageUrl").value = savedData.imageUrl || "";

        previewImage();
      }
    }

    function saveContent() {
      const contentData = {
        title: document.getElementById("title").value,
        subtitle: document.getElementById("subtitle").value,
        point1: document.getElementById("point1").value,
        point2: document.getElementById("point2").value,
        point3: document.getElementById("point3").value,
        stat1: document.getElementById("stat1").value,
        stat2: document.getElementById("stat2").value,
        stat3: document.getElementById("stat3").value,
        footerNote: document.getElementById("footerNote").value,
        imageUrl: document.getElementById("imageUrl").value
      };

      localStorage.setItem("dailyClassContent", JSON.stringify(contentData));

      const msg = document.getElementById("successMsg");
      msg.style.display = "block";

      setTimeout(() => {
        msg.style.display = "none";
      }, 2500);
    }

    function resetContent() {
      if (confirm("Are you sure you want to clear all saved content?")) {
        localStorage.removeItem("dailyClassContent");
        location.reload();
      }
    }

    function previewImage() {
      const imageUrl = document.getElementById("imageUrl").value.trim();
      const img = document.getElementById("imagePreview");

      if (imageUrl !== "") {
        img.src = imageUrl;
        img.style.display = "block";
      } else {
        img.style.display = "none";
      }
    }

    window.onload = loadExistingContent;
  </script>
</body>
</html>
