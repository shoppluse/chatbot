<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>sketch_apr28a | Arduino IDE 2.3.7</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      overflow: hidden;
      background: #ffffff;
    }

    /* WINDOW BAR */
    .window-bar {
      height: 28px;
      background: #e8e3dc;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      border-bottom: 1px solid #d4d1ca;
      font-size: 13px;
      color: #222;
    }

    .window-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .arduino-icon {
      width: 16px;
      height: 16px;
      background: #0a8c8d;
      border-radius: 4px;
      position: relative;
    }

    .arduino-icon::before {
      content: "∞";
      color: white;
      font-size: 12px;
      position: absolute;
      top: -1px;
      left: 2px;
    }

    .window-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      user-select: none;
    }

    /* MENU BAR */
    .menu-bar {
      height: 28px;
      background: #ffffff;
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 6px;
      font-size: 13px;
      color: #222;
      border-bottom: 1px solid #e0e0e0;
    }

    .menu-item {
      cursor: pointer;
      user-select: none;
    }

    .menu-item:hover {
      color: #006d70;
    }

    /* TOOLBAR */
    .toolbar {
      height: 46px;
      background: #006d70;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
    }

    .toolbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .round-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #7cc8c7;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #0b5d5f;
      font-size: 17px;
      font-weight: bold;
      cursor: pointer;
      user-select: none;
    }

    .board-select {
      width: 255px;
      height: 32px;
      background: #ffffff;
      margin-left: 8px;
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      font-size: 14px;
      color: #666;
      cursor: pointer;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 18px;
      color: #d9f7f7;
      font-size: 20px;
      user-select: none;
    }

    /* MAIN */
    .main {
      display: flex;
      height: calc(100vh - 130px);
    }

    /* SIDEBAR */
    .sidebar {
      width: 52px;
      background: #dfe5e4;
      border-right: 1px solid #cfd6d5;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    .side-btn {
      width: 100%;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }

    .side-btn svg {
      width: 28px;
      height: 28px;
      stroke: #a4afaf;
      fill: none;
      stroke-width: 1.8;
    }

    .side-btn:hover svg {
      stroke: #7d8a8a;
    }

    .bottom-user {
      position: absolute;
      bottom: 10px;
      width: 100%;
    }

    /* CONTENT */
    .content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #ffffff;
    }

    .tab-bar {
      height: 34px;
      display: flex;
      align-items: center;
      padding-left: 8px;
      border-bottom: 1px solid #e6e6e6;
      font-size: 14px;
      color: #444;
      background: #ffffff;
    }

    .editor {
      flex: 1;
      display: flex;
      background: #ffffff;
    }

    .line-numbers {
      width: 74px;
      background: #ffffff;
      color: #2f78b5;
      text-align: right;
      padding-right: 18px;
      padding-top: 8px;
      font-size: 14px;
      line-height: 1.5;
      user-select: none;
      white-space: pre;
    }

    .code-panel {
      flex: 1;
      background: #f7f7f7;
      padding-top: 8px;
      position: relative;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      color: #333;
      white-space: pre;
      border-left: 1px solid #efefef;
    }

    .cursor-line {
      position: absolute;
      top: 8px;
      left: 0;
      width: 2px;
      height: 20px;
      background: #16a0a3;
    }

    .kw {
      color: #0b9db0;
    }

    .comment {
      color: #95a2a6;
    }

    .orange {
      color: #d68033;
    }

    /* STATUS BAR */
    .status-bar {
      height: 28px;
      background: #006d70;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 18px;
      padding: 0 12px;
      color: #ffffff;
      font-size: 12px;
    }

    .status-bar span {
      display: flex;
      align-items: center;
      gap: 5px;
    }
  </style>
</head>
